cat > buildspec.yml <<'EOF'
version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - 'echo "=== PRE_BUILD ==="'
      - ': "${AWS_ACCOUNT_ID:?Falta AWS_ACCOUNT_ID}"'
      - ': "${AWS_DEFAULT_REGION:?Falta AWS_DEFAULT_REGION}"'
      - ': "${IMAGE_REPO_NAME:?Falta IMAGE_REPO_NAME}"'
      - ': "${CONTAINER_NAME:?Falta CONTAINER_NAME}"'
      - 'echo "Region = $AWS_DEFAULT_REGION"'
      - 'echo "Account = $AWS_ACCOUNT_ID"'
      - 'echo "Repo = $IMAGE_REPO_NAME"'
      - 'echo "Container = $CONTAINER_NAME"'
      - 'aws --version'
      - 'docker --version'
      - 'export REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME'
      - 'export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)'
      - 'export IMAGE_TAG=${COMMIT_HASH:-latest}'
      - 'echo "REPOSITORY_URI=$REPOSITORY_URI"'
      - 'echo "IMAGE_TAG=$IMAGE_TAG"'
      - 'aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com'

  build:
    commands:
      - 'echo "=== BUILD MAVEN ==="'
      - 'mvn clean package -DskipTests'
      - 'echo "=== VALIDANDO JAR ==="'
      - 'ls -lah'
      - 'ls -lah presentacion/target/'
      - 'echo "=== BUILD DOCKER ==="'
      - 'docker build --progress=plain --no-cache -t "$IMAGE_REPO_NAME:$IMAGE_TAG" .'
      - 'docker tag "$IMAGE_REPO_NAME:$IMAGE_TAG" "$REPOSITORY_URI:$IMAGE_TAG"'
      - 'docker images'

  post_build:
    commands:
      - 'echo "=== PUSH ECR ==="'
      - 'docker push "$REPOSITORY_URI:$IMAGE_TAG"'
      - 'printf "[{\"name\":\"%s\",\"imageUri\":\"%s\"}]" "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json'
      - 'cat imagedefinitions.json'

artifacts:
  files:
    - imagedefinitions.json
EOF